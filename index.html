<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Paper Reader AI</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #38bdf8; --border: #334155; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        .panel { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); margin-bottom: 20px; }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--border); box-sizing: border-box; font-size: 16px; }
        input { background: #0f172a; color: white; }
        button { background: var(--accent); color: #0f172a; font-weight: bold; cursor: pointer; border: none; }
        .summary-pair { margin-bottom: 18px; padding: 12px; border-left: 4px solid var(--accent); background: rgba(255,255,255,0.02); }
        .summary-en { font-size: 0.85rem; color: #94a3b8; margin-top: 5px; }
        .quiz-area { background: #1e293b; padding: 20px; border-radius: 16px; border: 2px dashed var(--accent); margin-top: 20px; }
        .quiz-option { background: #334155; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Daily Paper Reader AI</h1>
    <div class="panel">
        <label>Gemini API Key</label>
        <input type="password" id="api-key" placeholder="APIキーを入力">
        <label>テーマ設定</label>
        <input type="text" id="theme" placeholder="例: 再生医療 腎臓">
        <button onclick="fetchPaper()">AIに論文を探させて読む</button>
    </div>

    <div id="status" style="text-align:center; color:var(--accent); margin:20px;"></div>
    <div id="result-area" class="hidden">
        <div id="paper-content" class="panel"></div>
        <div id="quiz-container" class="quiz-area">
            <h3>🧠 理解度チェック</h3>
            <p id="quiz-question"></p>
            <div id="quiz-options"></div>
            <div id="quiz-feedback" class="panel hidden" style="margin-top:10px;"></div>
        </div>
    </div>
</div>

<script>
    // --- AI側で行った補完の説明 ---
    // 1. プレビュー版モデルを指定し、google_searchツールを有効化しました。
    // 2. 検索からクイズ表示までの全処理（render関数等）を1つにまとめました。

    const MODEL = "gemini-3.1-pro-preview";

    window.onload = () => {
        document.getElementById('api-key').value = localStorage.getItem('g_key') || '';
        document.getElementById('theme').value = localStorage.getItem('g_theme') || '最新のAI技術';
    };

    async function fetchPaper() {
        const key = document.getElementById('api-key').value;
        const theme = document.getElementById('theme').value;
        if (!key) return alert("API Keyを入力してください");

        localStorage.setItem('g_key', key);
        localStorage.setItem('g_theme', theme);

        const status = document.getElementById('status');
        status.innerText = "🤖 AIが論文を検索・要約中... (約30秒かかります)";
        
        try {
            const prompt = `あなたは優秀なリサーチアシスタントです。
1. Google検索を使用して、テーマ「${theme}」に関する最新の学術論文を1つ特定してください。
2. その論文のタイトル、抄録（Abstract）、URLを特定してください。
3. その抄録を、日本語1文・英語1文のペアで10セット（計20文）で要約してください。
4. 内容に関する4択クイズ1問を作成してください。

必ず以下のJSON形式でのみ回答してください：
{
  "title": "論文タイトル",
  "url": "論文のURL",
  "summary": [{"ja": "日本語文1", "en": "English sentence 1"}, ...],
  "quiz": {"question": "問題文", "options": ["選択肢1", "選択肢2", "選択肢3", "選択肢4"], "answer": 0, "explanation": "解説"}
}`;

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    tools: [{ google_search: {} }], 
                    generationConfig: { response_mime_type: "application/json" }
                })
            });

            const data = await res.json();
            if (data.error) throw new Error(`${data.error.message} (${data.error.status})`);
            
            const aiResult = JSON.parse(data.candidates[0].content.parts[0].text);
            render(aiResult);
            status.innerText = "";
        } catch (e) {
            status.innerText = "❌ エラーが発生しました";
            alert("エラー内容:\n" + e.message);
            console.error(e);
        }
    }

    function render(data) {
        document.getElementById('result-area').classList.remove('hidden');
        const content = document.getElementById('paper-content');
        content.innerHTML = `
            <h2 style="font-size: 1.2rem;">${data.title}</h2>
            <hr style="border:0; border-top:1px solid var(--border); margin:15px 0;">
            ${data.summary.map(s => `<div class="summary-pair"><div>${s.ja}</div><div class="summary-en">${s.en}</div></div>`).join('')}
            <div style="text-align:center; margin-top:20px;">
                <a href="${data.url}" target="_blank" style="color:var(--accent); text-decoration:none;">🔗 原文リンク</a>
            </div>
        `;

        document.getElementById('quiz-question').innerText = data.quiz.question;
        const optionsDiv = document.getElementById('quiz-options');
        optionsDiv.innerHTML = "";
        data.quiz.options.forEach((opt, i) => {
            const btn = document.createElement('div');
            btn.className = 'quiz-option';
            btn.innerText = opt;
            btn.onclick = () => {
                const feedback = document.getElementById('quiz-feedback');
                feedback.classList.remove('hidden');
                const isCorrect = i === data.quiz.answer;
                feedback.innerHTML = `<b>${isCorrect ? '✅ 正解！' : '❌ 不正解...'}</b><br>${data.quiz.explanation}`;
                feedback.style.color = isCorrect ? "#22c55e" : "#ef4444";
            };
            optionsDiv.appendChild(btn);
        });
    }
</script>
</body>
</html>
